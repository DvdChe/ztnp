---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ztnp.io
  resources:
  - symmetricrules
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ztnp.io
  resources:
  - symmetricrules/status
  verbs:
  - get
  - patch
  - update
