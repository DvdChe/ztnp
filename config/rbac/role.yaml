---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ztnp.io
  resources:
  - rulesets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ztnp.io
  resources:
  - rulesets/finalizers
  - symmetricrules/finalizers
  verbs:
  - update
- apiGroups:
  - ztnp.io
  resources:
  - rulesets/status
  - symmetricrules/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ztnp.io
  resources:
  - symmetricrules
  verbs:
  - get
  - list
  - patch
  - update
  - watch
