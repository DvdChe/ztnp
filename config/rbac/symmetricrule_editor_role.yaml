# This rule is not used by the project ztnp itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ztnp.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ztnp
    app.kubernetes.io/managed-by: kustomize
  name: symmetricrule-editor-role
rules:
- apiGroups:
  - ztnp.io
  resources:
  - symmetricrules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ztnp.io
  resources:
  - symmetricrules/status
  verbs:
  - get
